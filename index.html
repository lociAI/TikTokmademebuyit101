<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral Finds - Hot Dropshipping Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .product-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600">ViralFinds.</h1>
            <nav>
                <ul class="flex space-x-6">
                    <li><a href="#" class="hover:text-indigo-600">Home</a></li>
                    <li><a href="#" class="hover:text-indigo-600">Categories</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="bg-indigo-600 text-white py-12 px-4 text-center">
        <h2 class="text-4xl font-extrabold mb-4">The Next Viral Product is Here</h2>
        <p class="text-lg opacity-90">Automated dropshipping store powered by Viral Product Mining Bot.</p>
    </section>

    <!-- Main Storefront -->
    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-12 text-gray-400">Loading viral finds...</div>
        </div>
    </main>

    <!-- Checkout Modal -->
    <div id="checkout-modal" class="modal fixed inset-0 bg-black bg-opacity-50 items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden">
            <div class="bg-indigo-600 p-6 text-white text-center">
                <h3 class="text-xl font-bold">Secure Checkout</h3>
                <p class="text-sm opacity-90">Auto-processed as Dropship</p>
            </div>
            <form id="checkout-form" class="p-6 space-y-4" action="https://formspree.io/f/mqakvweb" method="POST">
                <input type="hidden" id="product-id" name="asin">
                <input type="hidden" id="product-price" name="price">
                <input type="hidden" id="product-title-hidden" name="product_name">
                <input type="hidden" id="product-ali-url" name="aliexpress_url">
                
                <div id="checkout-product-info" class="text-center pb-4 border-b border-gray-100 mb-4">
                    <p id="modal-product-title" class="font-bold text-gray-700"></p>
                    <p id="modal-product-price" class="text-indigo-600 text-2xl font-black"></p>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Full Name</label>
                    <input type="text" name="customer_name" required class="w-full border rounded-lg p-2" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Email Address</label>
                    <input type="email" name="customer_email" required class="w-full border rounded-lg p-2" placeholder="john@example.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Shipping Address</label>
                    <textarea name="address" required class="w-full border rounded-lg p-2" placeholder="123 Street, City, Zip, Country"></textarea>
                </div>
                
                <div class="pt-4 space-y-2">
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition">
                        PAY WITH PAYPAL / CARD
                    </button>
                    <button type="button" onclick="closeModal()" class="w-full text-xs text-gray-400 py-2">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentProducts = [];

        function openCheckout(index) {
            const product = currentProducts[index];
            if (!product) return;

            document.getElementById('modal-product-title').innerText = product.title;
            document.getElementById('modal-product-price').innerText = product.retail_price || '$29.99';
            
            document.getElementById('product-id').value = product.asin || 'N/A';
            document.getElementById('product-price').value = product.retail_price || '$29.99';
            document.getElementById('product-title-hidden').value = product.title;
            document.getElementById('product-ali-url').value = product.aliexpress_url || '#';
            
            document.getElementById('checkout-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('checkout-modal').classList.remove('active');
        }

        const form = document.getElementById('checkout-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const formData = new FormData(form);
            const price = document.getElementById('product-price').value.replace('$', '');
            const title = document.getElementById('product-title-hidden').value;
            const paypalEmail = "jtechsoftware101@gmail.com";
            const paypalUrl = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=${encodeURIComponent(paypalEmail)}&item_name=${encodeURIComponent(title)}&amount=${price}&currency_code=USD`;

            try {
                // Show loading state
                const btn = form.querySelector('button[type="submit"]');
                const originalText = btn.innerText;
                btn.innerText = "Processing...";
                btn.disabled = true;

                await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
                
                window.location.href = paypalUrl;
            } catch (error) {
                console.error(error);
                alert("Order connection error. Please check your internet.");
                const btn = form.querySelector('button[type="submit"]');
                btn.innerText = "PAY WITH PAYPAL / CARD";
                btn.disabled = false;
            }
        };

        async function loadProducts() {
            try {
                const response = await fetch('products.json');
                currentProducts = await response.json();
                const grid = document.getElementById('product-grid');
                
                if (currentProducts.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-12">No products discovered yet. Run the bot!</div>';
                    return;
                }

                grid.innerHTML = currentProducts.map((p, index) => `
                    <div class="product-card bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 flex flex-col p-4">
                        <div class="h-48 w-full flex items-center justify-center bg-white mb-4">
                            <img src="${p.image_url}" class="max-h-full max-w-full object-contain" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                        </div>
                        <h3 class="text-sm font-bold h-12 overflow-hidden mb-2 text-gray-800">${p.title}</h3>
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-indigo-600 font-black text-xl">${p.retail_price || '$29.99'}</span>
                            <span class="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-1 rounded-full font-bold uppercase">Trending</span>
                        </div>
                        <button onclick="openCheckout(${index})" class="w-full bg-black text-white py-3 rounded-lg font-bold hover:bg-gray-800 transition active:scale-95">BUY NOW</button>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
                document.getElementById('product-grid').innerHTML = '<div class="col-span-full text-center text-red-500 py-12">Store Offline. Please ensure products.json is correctly formatted.</div>';
            }
        }
        
        loadProducts();
    </script>
</body>
</html>
